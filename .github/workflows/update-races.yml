name: Update Races

on:
  schedule:
    - cron: '0 7 * * 3'  # Çarşamba 10:00 TR (UTC+3)
    - cron: '0 7 * * 6'  # Cumartesi 10:00 TR (UTC+3)
  workflow_dispatch:       # manuel tetikleme (test için)

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 python-dotenv

      - name: Scrape races
        run: python3 scraper/scraper.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/races.json
          git diff --staged --quiet || git commit -m "chore: update races data"
          git push

      - name: Send Telegram notification
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python3 scraper/notify.py
